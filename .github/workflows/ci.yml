name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  JAVA_VERSION: '8'
  PROJECT_NAME: exchange-rate

jobs:
  # ============ CI 阶段：构建与测试 ============
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      checks: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: 修复 mvnw 权限
        run: chmod +x mvnw

      - name: Maven 编译
        id: compile
        run: |
          ./mvnw compile -q
          echo "status=success" >> $GITHUB_OUTPUT

      - name: Maven 测试（生成报告）
        id: test
        run: |
          ./mvnw test
          echo "status=success" >> $GITHUB_OUTPUT
        env:
          MAVEN_OPTS: -Dmaven.repo.local=$HOME/.m2/repository

      - name: 生成 JaCoCo 覆盖率报告
        run: |
          ./mvnw jacoco:report -q || true

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ github.run_id }}
          path: target/surefire-reports/
          retention-days: 7

      - name: 发布测试结果
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: 'target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      # ============ 生成 CI 报告 ============
      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成 CI 聚合报告
        run: |
          mkdir -p ci-reports
          python scripts/generate-ci-report.py

      # ============ 发布报告到 GitHub Pages ============
      - name: 配置 GitHub Pages
        uses: actions/configure-pages@v4

      - name: 上传 CI 报告到 Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ci-reports/

      - name: 上传单测报告到 Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/surefire-reports/
          destination: test-report

      - name: 上传覆盖率报告到 Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: target/site/jacoco/
          destination: coverage

      - name: 部署 GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      # ============ 飞书通知 ============
      - name: 发送飞书报告
        if: always()
        run: python scripts/send_feishu_report.py || true
        env:
          FEISHU_APP_ID: ${{ secrets.FEISHU_APP_ID }}
          FEISHU_APP_SECRET: ${{ secrets.FEISHU_APP_SECRET }}
          FEISHU_USER_OPEN_ID: ${{ secrets.FEISHU_USER_OPEN_ID }}
          GITHUB_RUN_ID: ${{ github.run_id }}
          GITHUB_REPO: ${{ github.repository }}
          GITHUB_SHA: ${{ github.sha }}
          PAGES_URL: ${{ steps.deployment.outputs.page_url }}
          COMPILE_STATUS: ${{ steps.compile.outputs.status }}
          TEST_STATUS: ${{ steps.test.outputs.status }}

  # ============ 构建阶段：打包 ============
  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: ci

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 修复 mvnw 权限
        run: chmod +x mvnw

      - name: Maven 打包
        run: |
          ./mvnw package -DskipTests -q

      - name: 上传 JAR 文件
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PROJECT_NAME }}-jar-${{ github.run_id }}
          path: target/*.jar
          retention-days: 5

  # ============ 发布阶段：GitHub Releases ============
  release:
    name: Release
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 修复 mvnw 权限
        run: chmod +x mvnw

      - name: 获取版本号
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION"

      - name: Maven 打包
        run: ./mvnw package -DskipTests -q

      - name: 创建 Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'SNAPSHOT') }}
          generate_release_notes: true
          files: |
            target/${{ env.PROJECT_NAME }}-${{ steps.version.outputs.VERSION }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ============ Docker 镜像构建（可选） ============
  docker:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'

      - name: 修复 mvnw 权限
        run: chmod +x mvnw

      - name: Maven 打包
        run: ./mvnw package -DskipTests -q

      - name: 提取版本号
        id: version
        run: |
          VERSION=$(./mvnw help:evaluate -Dexpression=project.version -q -DforceStdout)
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: 设置 QEMU
        uses: docker/setup-qemu-action@v3

      - name: 设置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 构建并推送 Docker 镜像
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.version.outputs.VERSION }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}:buildcache,mode=max
