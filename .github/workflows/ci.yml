name: CI/CD Pipeline

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master ]

env:
  JAVA_VERSION: '8'
  PROJECT_NAME: exchange-rate

jobs:
  ci:
    name: Build & Test
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout 代码
        uses: actions/checkout@v4

      - name: 设置 JDK
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: 'temurin'
          cache: 'maven'

      - name: 缓存 Maven 依赖
        uses: actions/cache@v4
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}

      - name: 修复 mvnw 权限
        run: chmod +x mvnw

      - name: Maven 测试
        run: ./mvnw test

      - name: 上传测试报告
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: target/surefire-reports/

      - name: 发布测试结果
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: JUnit Test Results
          path: 'target/surefire-reports/*.xml'
          reporter: java-junit
          fail-on-error: false
          fail-on-empty: false

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 生成 CI 聚合报告
        run: |
          mkdir -p ci-reports
          python scripts/generate-ci-report.py

      - name: 上传 CI 报告
        uses: actions/upload-artifact@v4
        with:
          name: ci-reports
          path: ci-reports/
